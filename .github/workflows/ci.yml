name: CI

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test-all:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tll_db
          POSTGRES_USER: tll_user
          POSTGRES_PASSWORD: changeme_in_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tll_user -d tll_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://tll_user:changeme_in_ci@127.0.0.1:5432/tll_db
      JWT_SECRET: ci_test_secret_do_not_use_in_prod
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run full test suite
        run: npm run test:all
