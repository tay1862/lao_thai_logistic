services:
  db:
    image: postgres:16-alpine
    container_name: tll_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tll_db
      POSTGRES_USER: tll_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tll_user -d tll_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tll_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tll_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tll_user:${DB_PASSWORD:-changeme_in_production}@db:5432/tll_db
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
      UPLOAD_DIR: /app/uploads
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    networks:
      - tll_network
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: tll_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - tll_network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  tll_network:
    driver: bridge
