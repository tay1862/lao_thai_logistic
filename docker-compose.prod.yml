# docker-compose.prod.yml — Production deployment
#
# Uses a pre-built image from GitHub Container Registry (GHCR).
# Never runs `docker compose build` — image is built by GitHub Actions.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml pull web   # to update
#
# Required .env vars: DB_PASSWORD, JWT_SECRET, NEXT_PUBLIC_APP_URL, WEB_IMAGE

services:
  db:
    image: postgres:16-alpine
    container_name: tll_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tll_db
      POSTGRES_USER: tll_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tll_user -d tll_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tll_network

  web:
    image: ${WEB_IMAGE}
    container_name: tll_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tll_user:${DB_PASSWORD}@db:5432/tll_db
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE:-en}
      UPLOAD_DIR: /app/uploads
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB:-5}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ORG: ${SENTRY_ORG:-}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      SENTRY_ENVIRONMENT: production
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "3000"
    networks:
      - tll_network

  nginx:
    image: nginx:alpine
    container_name: tll_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Let's Encrypt certs (populated by certbot on host)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Certbot webroot challenge dir
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - tll_network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  tll_network:
    driver: bridge
